description: >-
  ExcaliDash is a self-hosted dashboard and organizer for Excalidraw. Store all
  your drawings persistently, collaborate in real-time, organize them into
  collections, and share them with scoped access controls.


  Features include persistent storage, real-time collaboration, multi-user
  authentication (local or OIDC), scoped internal & external sharing, full-text
  search, drag-and-drop collections, and export/import for backups.

