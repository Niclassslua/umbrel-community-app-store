manifestVersion: 1
id: niclassslua-threatdragon
name: Threat Dragon
tagline: Open source threat modelling tool from OWASP
icon: https://raw.githubusercontent.com/OWASP/threat-dragon/main/docs/assets/images/cupcake-128x128.png
category: Security
version: "2.2.0"
port: 8889
description: >-
  OWASP Threat Dragon is a free, open-source, cross-platform threat modelling
  application including system diagramming and a rule engine to auto-generate
  threats/mitigations.

  Use it to draw data-flow diagrams, identify threats using the built-in STRIDE
  rule engine, add mitigations, and export reports — all running locally on your
  Umbrel device.

  This deployment runs in desktop/local-storage mode so no GitHub/GitLab
  account is required. Threat models are saved inside the app data directory.

  ⚠️  Before first use, change the JWT and encryption keys in the
  docker-compose.yml to unique random values for your installation.

developer: OWASP
website: https://owasp.org/www-project-threat-dragon/
submitter: Niclassslua
submission: https://github.com/Niclassslua/umbrel-community-app-store
