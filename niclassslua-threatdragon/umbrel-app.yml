  - https://raw.githubusercontent.com/OWASP/threat-dragon/main/docs/assets/images/add-threat.png
  - https://raw.githubusercontent.com/OWASP/threat-dragon/main/docs/assets/images/components.png
releaseNotes: >-
  Initial Umbrel release of OWASP Threat Dragon v2.2.0 running in local-storage
  mode. See https://github.com/OWASP/threat-dragon/releases for upstream
  release notes.
