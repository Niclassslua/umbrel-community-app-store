version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: niclassslua-threatdragon_app_1
      APP_PORT: 3000

  app:
    image: owasp/threat-dragon:v2.2.0
    restart: on-failure
    environment:
      # Application environment
      - NODE_ENV=production
      - SERVER_API_PROTOCOL=https
      - TRUST_PROXY=1

      # ---------------------------------------------------------------
      # SECURITY KEYS — change these to unique random values!
      # Generate with: openssl rand -hex 32
      # ---------------------------------------------------------------
      - ENCRYPTION_JWT_REFRESH_SIGNING_KEY=03e6c1fcef29a098d5b82c5c3ced65f5e7f8a1f1b9dbebf59e5d3a4b28c71e92
      - ENCRYPTION_JWT_SIGNING_KEY=5f3a7b9c1d2e4f6a8b0c2d4e6f8a0b1c3d5e7f9a1b2c3d4e5f6a7b8c9d0e1f2a
      - ENCRYPTION_KEYS=[{"isPrimary":true,"id":0,"value":"11223344556677889900aabbccddeeff"}]

      # ---------------------------------------------------------------
      # Uncomment and configure ONE of the sections below to enable
      # saving threat models to a remote repository.
      # Without these, the app runs in local desktop storage mode.
      # ---------------------------------------------------------------

      # -- GitHub integration --
      # - GITHUB_CLIENT_ID=your_github_client_id
      # - GITHUB_CLIENT_SECRET=your_github_client_secret
      # - GITHUB_REDIRECT_URI=http://umbrel.local:8889/api/oauth/return

      # -- GitLab integration --
      # - GITLAB_CLIENT_ID=your_gitlab_client_id
      # - GITLAB_CLIENT_SECRET=your_gitlab_client_secret
      # - GITLAB_REDIRECT_URI=http://umbrel.local:8889/api/oauth/return
      # - GITLAB_HOST=https://gitlab.com

      # -- Bitbucket integration --
      # - BITBUCKET_CLIENT_ID=your_bitbucket_client_id
      # - BITBUCKET_CLIENT_SECRET=your_bitbucket_client_secret
      # - BITBUCKET_REDIRECT_URI=http://umbrel.local:8889/api/oauth/return

    volumes:
      - ${APP_DATA_DIR}/data:/app/public
