version: "3.7"

services:

  app_proxy:
    environment:
      # Routes Umbrel's reverse proxy to the ExcaliDash frontend nginx
      APP_HOST: sparkles-excalidash_frontend_1
      APP_PORT: 80

  backend:
    image: zimengxiong/excalidash-backend:latest
    restart: on-failure
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - PORT=8000
      - NODE_ENV=production
      - AUTH_MODE=local
      # Trust exactly one reverse-proxy hop (Umbrel's app_proxy → frontend nginx → backend)
      - TRUST_PROXY=1
      # Allow requests from the standard Umbrel local hostname.
      # If you access Umbrel via IP address, add it here (comma-separated):
      # e.g. FRONTEND_URL=http://umbrel.local:6767,http://192.168.1.100:6767
      - FRONTEND_URL=http://umbrel.local:6767
      # JWT_SECRET and CSRF_SECRET are intentionally unset: ExcaliDash auto-generates
      # them on first start and persists them in the data volume.
    volumes:
      - ${APP_DATA_DIR}/data:/app/prisma

  frontend:
    image: zimengxiong/excalidash-frontend:latest
    restart: on-failure
    depends_on:
      - backend
